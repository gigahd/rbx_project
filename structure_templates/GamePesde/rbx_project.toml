template_name = "GamePesde"

[rokit]
rojo = "rojo-rbx/rojo@7.7.0-rc.1"
pesde = ""
blink = "1Axen/blink"
StyLua = ""
lune = ""
luau-lsp = ""
moonwave = ""

[pesde.dependencies]
# Reactive UI framework — pick one:
Vide = { wally = "centau/vide", version = "^0.4.0" }
# Fusion = { wally = "elttob/fusion", version = "0.3.0" }
# React = { wally = "jsdotlua/react", version = "^17.3.0" }
# ReactRoblox = { wally = "jsdotlua/react-roblox", version = "^17.3.0" }

# Old-school UI library (still widely used)
# Roact = { wally = "roblox/roact", version = "^1.4.4" }

# Component libraries
# Fusion:
# OnyxUI = { wally = "imavafe/onyx-ui", version = "^1.0.4" }

# React:
# StudioComponents = { wally = "sircfenner/studiocomponents", version = "1.2.0" }

# Reactive state (works on client AND server)
Charm = { wally = "littensy/charm", version = "0.11.0-rc.5" }
CharmSync = { wally = "littensy/charm-sync", version = "0.4.0-rc.7" }

VideCharm = { wally = "littensy/vide-charm", version = "0.4.0-rc.5" }
# ReactCharm = { wally = "littensy/react-charm", version = "^0.3.0" }

# Animation library
Ripple = { wally = "littensy/ripple", version = "^0.10.0" }
VideRipple = { wally = "littensy/vide-ripple", version = "^0.10.2" }
# ReactRipple = { wally = "littensy/react-ripple", version = "^3.0.1" }

# Runtime Typechecker
# T = { wally = "osyrisrblx/t", version = "^3.1.1" }
GT = { wally = "corecii/greentea", version = "0.4.11" }

# Module loader
OnBoot = { wally = "gigahd/onboot", version = "^0.5.2" }

# Utility libraries
Signal = { wally = "kineticwallet/lemon-signal", version = "1.10.0" }
Trove = { wally = "sleitnick/trove", version = "^1.8.0" }

# Async utilities
Future = { wally = "red-blox/future", version = "^1.0.1" }
Promise = { wally = "evaera/promise", version = "^4.0.0" }

# ECS framework
# Jecs = { wally = "ukendio/jecs", version = "0.11.0" }

# Debug UI
Iris = { wally = "sirmallard/iris", version = "2.5.1" }

# UI Storybook helper
UILabs = { wally = "pepeeltoro41/ui-labs", version = "^2.4.2" }

# ECS Debugging
# Jabby = { wally = "alicesaidhi/jabby", version = "0.5.1" }

[pesde.peer_dependencies]
# Player data Store
ProfileStore = { wally = "lm-loleris/profilestore", version = "^1.0.3" }
# Lyra's built specifically for handling trading as well. So if you need trading in your game consider using Lyra.
# Lyra = { wally = "paradoxum-games/lyra", version = "0.6.0" }

[pesde.dev_dependencies]
# Testing framework
Jest = { wally = "jsdotlua/jest", version = "^3.10.0" }
JestGlobals = { wally = "jsdotlua/jest-globals", version = "^3.10.0" }

# Older testing framework (still widely used)
# TestEZ = { wally = "felixdev/testez", version = "^0.4.1" }
