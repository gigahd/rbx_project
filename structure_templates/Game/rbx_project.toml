template_name = "Game"

[rokit]
rojo = "rojo-rbx/rojo@7.7.0-rc.1"
wally = ""
wally-package-types = ""
pesde = ""
blink = "1Axen/blink"
StyLua = ""
lune = ""
luau-lsp = ""
moonwave = ""

[wally.shared]
# Reactive UI framework — pick one:
Vide = "centau/vide@^0.4.0"
# Fusion = "elttob/fusion@0.3.0"
# React = "jsdotlua/react@^17.3.0"
# ReactRoblox = "jsdotlua/react-roblox@^17.3.0"

# Old-school UI library (still widely used)
# Roact = "roblox/roact@^1.4.4"

# Component libraries
# Vide:

# Fusion:
# OnyxUI = "imavafe/onyx-ui@^1.0.4"

# React:
# StudioComponents = "sircfenner/studiocomponents@1.2.0"

# Reactive state (works on client AND server)
Charm = "littensy/charm@0.11.0-rc.5"
CharmSync = "littensy/charm-sync@0.4.0-rc.7"


VideCharm = "littensy/vide-charm@0.4.0-rc.5"
# ReactCharm = "littensy/react-charm@^0.3.0"

# Animation library
Ripple = "littensy/ripple@^0.10.0"
VideRipple = "littensy/vide-ripple@^0.10.2"
# ReactRipple = "littensy/react-ripple@^3.0.1"

# Runtime Typechecker
# T = "osyrisrblx/t@^3.1.1"
GT = "corecii/greentea@0.4.11"

# Module loader
OnBoot = "gigahd/onboot@^0.5.2"

# Utility libraries
Signal = "kineticwallet/lemon-signal@1.10.0"
Trove = "sleitnick/trove@^1.8.0"

# Async utilities
Future = "red-blox/future@^1.0.1"
Promise = "evaera/promise@^4.0.0"

# ECS framework
# Jecs = "ukendio/jecs@0.11.0"

# Debug UI
Iris = "sirmallard/iris@2.5.1"

# UI Storybook helper
UILabs = "pepeeltoro41/ui-labs@^2.4.2"

# ECS Debugging
# Jabby = "alicesaidhi/jabby@0.5.1"

[wally.server]
# Player data Store
ProfileStore = "lm-loleris/profilestore@^1.0.3"
# Lyra's built specifically for handling trading as well. So if you need trading in your game consider using Lyra.
# Lyra = "paradoxum-games/lyra@0.6.0"

[wally.dev]
# Testing framework
Jest = "jsdotlua/jest@^3.10.0"
JestGlobals = "jsdotlua/jest-globals@^3.10.0"

# Older testing framework (still widely used)
# TestEZ = "felixdev/testez@^0.4.1"

[pesde.dependencies]
# Reactive UI framework — pick one:
Vide = { wally = "centau/vide", version = "^0.4.0" }
# Fusion = { wally = "elttob/fusion", version = "0.3.0" }
# React = { wally = "jsdotlua/react", version = "^17.3.0" }
# ReactRoblox = { wally = "jsdotlua/react-roblox", version = "^17.3.0" }

# Reactive state (works on client AND server)
Charm = { wally = "littensy/charm", version = "0.11.0-rc.5" }
CharmSync = { wally = "littensy/charm-sync", version = "0.4.0-rc.7" }

VideCharm = { wally = "littensy/vide-charm", version = "0.4.0-rc.5" }

# Animation library
Ripple = { wally = "littensy/ripple", version = "^0.10.0" }
VideRipple = { wally = "littensy/vide-ripple", version = "^0.10.2" }

# Runtime Typechecker
GT = { wally = "corecii/greentea", version = "0.4.11" }

# Module loader
OnBoot = { wally = "gigahd/onboot", version = "^0.5.2" }

# Utility libraries
Signal = { wally = "kineticwallet/lemon-signal", version = "1.10.0" }
Trove = { wally = "sleitnick/trove", version = "^1.8.0" }

# Async utilities
Future = { wally = "red-blox/future", version = "^1.0.1" }
Promise = { wally = "evaera/promise", version = "^4.0.0" }

# Debug UI
Iris = { wally = "sirmallard/iris", version = "2.5.1" }

# UI Storybook helper
UILabs = { wally = "pepeeltoro41/ui-labs", version = "^2.4.2" }

[pesde.peer_dependencies]
# Player data Store
ProfileStore = { wally = "lm-loleris/profilestore", version = "^1.0.3" }

[pesde.dev_dependencies]
# Testing framework
Jest = { wally = "jsdotlua/jest", version = "^3.10.0" }
JestGlobals = { wally = "jsdotlua/jest-globals", version = "^3.10.0" }